templates/index.html<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עוזרת הפרדס</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f0;direction:rtl;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.app{background:#fff;border-radius:20px;box-shadow:0 4px 24px rgba(0,0,0,0.10);width:100%;max-width:680px;display:flex;flex-direction:column;height:95vh;max-height:850px;overflow:hidden}

.hdr{background:#E8510A;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.hdr-logo{width:56px;height:56px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:30px}
.hdr-title{font-size:21px;font-weight:700;color:#fff;line-height:1.2}
.hdr-sub{font-size:13px;color:rgba(255,255,255,0.9);margin-top:3px}
.hdr-badge{margin-right:auto;background:rgba(255,255,255,0.2);color:#fff;font-size:13px;padding:6px 14px;border-radius:20px;white-space:nowrap;font-weight:600}

.mode-bar{padding:10px 18px;display:flex;align-items:center;gap:8px;font-size:14px;flex-shrink:0;font-weight:600}
.mode-bar.shoham{background:#FFF3E0;border-bottom:2px solid #FFB74D;color:#E65100}
.mode-bar.granot{background:#E8F5E9;border-bottom:2px solid #66BB6A;color:#1B5E20}
.mode-bar.general{background:#F1F8E9;border-bottom:2px solid #AED581;color:#33691E}
.mode-bar.fruit{background:#E3F2FD;border-bottom:2px solid #64B5F6;color:#0D47A1}
.mode-bar button{background:none;border:none;cursor:pointer;font-size:13px;text-decoration:underline;font-family:inherit;font-weight:600;color:inherit}

.msgs{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:14px;background:#F5F5F0}

.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px}
.av-bot{background:#fff;border:1px solid #ddd}
.av-user{background:#E3F2FD}

.bubble{padding:14px 17px;border-radius:18px;font-size:16px;line-height:1.7;max-width:85%;word-wrap:break-word;white-space:pre-wrap}
.bubble.bot{background:#fff;color:#1a1a1a;border-bottom-right-radius:5px;border:1px solid #e0e0e0}
.bubble.user{background:#E8510A;color:#fff;border-bottom-left-radius:5px;font-size:17px}

.bubble.bot strong{color:#BF360C}
.bubble.bot hr{border:none;border-top:2px solid #f0e0d0;margin:12px 0}

.product-block{background:#FAFAF6;border-radius:12px;padding:12px 14px;margin:10px 0;border-right:4px solid #1D9E75}
.product-block.shoham-product{border-right-color:#FF8F00}
.product-block.granot-product{border-right-color:#2E7D32}
.product-block .pname{font-size:17px;font-weight:700;color:#1a1a1a;margin-bottom:6px}
.product-block .prow{font-size:14px;margin:4px 0;color:#333;line-height:1.6}
.product-block .prow.warn{color:#B71C1C;background:#FFEBEE;padding:6px 10px;border-radius:8px;margin-top:6px;font-weight:600}
.product-block .prow.info{color:#1B5E20}

.warning-box{background:#FFF8E1;border:2px solid #FFB300;border-radius:12px;padding:12px 14px;margin:10px 0}
.warning-box.granot-box{background:#E8F5E9;border-color:#66BB6A}
.warning-box .wb-title{font-size:16px;font-weight:700;color:#E65100;margin-bottom:8px}
.warning-box.granot-box .wb-title{color:#1B5E20}
.warning-box ul{padding-right:20px;margin:6px 0}
.warning-box li{font-size:14px;color:#5D4037;margin:4px 0;line-height:1.5}

.disclaimer-box{background:#FAFAF8;border-top:2px solid #E0E0E0;padding:10px 14px;margin-top:14px;font-size:13px;color:#666;line-height:1.6}
.disclaimer-box strong{color:#BF360C}

.followup-box{background:#F0F4F8;border-radius:12px;padding:12px 14px;margin-top:12px;border-right:4px solid #1565C0}
.followup-box .fb-title{font-size:14px;font-weight:700;color:#0D47A1;margin-bottom:8px}

.quick-row{display:flex;gap:9px;flex-wrap:wrap;margin-top:14px}
.qb{font-size:15px;padding:11px 18px;border-radius:24px;border:2px solid #E8510A;background:#FFF3EE;color:#BF360C;cursor:pointer;font-weight:700;transition:all .15s;line-height:1.3;font-family:inherit}
.qb:hover{background:#E8510A;color:#fff}
.qb.green{border-color:#2E7D32;background:#E8F5E9;color:#1B5E20}
.qb.green:hover{background:#2E7D32;color:#fff}
.qb.yellow{border-color:#F57C00;background:#FFF3E0;color:#E65100}
.qb.yellow:hover{background:#F57C00;color:#fff}
.qb.blue{border-color:#1565C0;background:#E3F2FD;color:#0D47A1}
.qb.blue:hover{background:#1565C0;color:#fff}
.qb.gray{border-color:#616161;background:#F5F5F5;color:#212121}
.qb.gray:hover{background:#616161;color:#fff}

.typing-row{display:flex;gap:10px;align-items:flex-end}
.typing-bub{background:#fff;border:1px solid #e0e0e0;border-radius:18px;border-bottom-right-radius:5px;padding:16px 20px}
.dots{display:flex;gap:7px}
.dot{width:10px;height:10px;border-radius:50%;background:#E8510A;animation:blink 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

.inp-area{padding:13px 14px;border-top:1px solid #E0E0E0;display:flex;gap:10px;align-items:center;background:#fff;flex-shrink:0}
.inp-wrap{flex:1;background:#F5F5F0;border:2px solid #BDBDBD;border-radius:30px;display:flex;align-items:center;padding:4px 6px 4px 18px;transition:border-color .15s}
.inp-wrap:focus-within{border-color:#E8510A;background:#fff}
.inp-wrap input{flex:1;border:none;background:transparent;font-size:17px;color:#1a1a1a;outline:none;padding:9px 0;direction:rtl;font-family:Arial,sans-serif}
.inp-wrap input::placeholder{color:#aaa}
.send-btn{width:50px;height:50px;background:#E8510A;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;font-size:22px;color:#fff}
.send-btn:hover{background:#BF360C}
.send-btn:disabled{background:#BDBDBD;cursor:not-allowed}

.disclaimer-strip{background:#FFF8E1;border-top:1px solid #FFE082;padding:8px 14px;font-size:12px;color:#5D4037;text-align:center;line-height:1.5}
.disclaimer-strip strong{color:#BF360C}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="hdr-logo">🍊</div>
    <div>
      <div class="hdr-title">עוזרת הפרדס</div>
      <div class="hdr-sub">ארגון מגדלי ההדרים בישראל</div>
    </div>
    <span class="hdr-badge" id="hdrBadge">✓ רשמי</span>
  </div>

  <div class="mode-bar" id="modeBar" style="display:none">
    <span id="modeLabel"></span>
    <button onclick="resetMode()">התחל מחדש</button>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="inp-area">
    <div class="inp-wrap">
      <input type="text" id="inp" placeholder="כתוב את הבעיה בפרדס שלך..." />
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()" aria-label="שלח">➤</button>
  </div>

  <div class="disclaimer-strip">
    ⚠️ <strong>המלצה בלבד</strong> — האחריות על המשתמש | חובה לקרוא תווית ולהתייעץ עם מדריך
  </div>
</div>

<script>
const SERVER_URL = '';

let appMode = null;
let growerType = null;
let history = [];
let fruitContext = {};
let isLoading = false;

// ============ Formatting ============

function formatReply(text) {
  text = text.replace(/\|/g, ' ');
  const parts = text.split(/\n---+\n/);
  let html = '';

  for (let part of parts) {
    part = part.trim();
    if (!part) continue;

    if (part.includes('כללי שוהם') && part.includes('חובה')) {
      html += renderWarningBox(part, 'shoham');
      continue;
    }
    if (part.includes('כללי גרנות') && part.includes('חובה')) {
      html += renderWarningBox(part, 'granot');
      continue;
    }
    if (part.includes('המלצה בלבד') || part.includes('האחריות המלאה')) {
      html += '<div class="disclaimer-box">' + cleanLine(part).replace(/\n/g, '<br>') + '</div>';
      continue;
    }
    if (part.match(/^[🌿🟢🔴🌱🍊]/m) || (part.includes('חומר פעיל:') && part.includes('ימי המתנה'))) {
      html += renderProductBlock(part);
      continue;
    }
    html += '<div style="margin:8px 0">' + cleanLine(part).replace(/\n/g, '<br>') + '</div>';
  }
  return html;
}

function renderWarningBox(text, kind) {
  const cls = kind === 'granot' ? 'warning-box granot-box' : 'warning-box';
  const lines = text.split('\n').filter(l => l.trim());
  let html = `<div class="${cls}">`;
  let titleSet = false;
  let bullets = [];
  for (let line of lines) {
    line = line.trim().replace(/^"|"$/g, '');
    if (line.startsWith('•') || line.startsWith('-') || line.startsWith('*')) {
      bullets.push(line.substring(1).trim());
    } else if (!titleSet) {
      html += '<div class="wb-title">' + cleanLine(line) + '</div>';
      titleSet = true;
    }
  }
  if (bullets.length) {
    html += '<ul>' + bullets.map(b => '<li>' + cleanLine(b) + '</li>').join('') + '</ul>';
  }
  html += '</div>';
  return html;
}

function renderProductBlock(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const cls = growerType === 'shoham' ? 'product-block shoham-product' :
              growerType === 'granot' ? 'product-block granot-product' : 'product-block';
  let html = `<div class="${cls}">`;
  let nameSet = false;
  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    if (!nameSet && (line.includes('**') || line.match(/^[🌿🟢🔴🌱🍊]/))) {
      html += '<div class="pname">' + cleanLine(line) + '</div>';
      nameSet = true;
    } else if (line.startsWith('⚠️')) {
      html += '<div class="prow warn">' + cleanLine(line) + '</div>';
    } else if (line.startsWith('ℹ️') || line.startsWith('💡')) {
      html += '<div class="prow info">' + cleanLine(line) + '</div>';
    } else {
      html += '<div class="prow">' + cleanLine(line) + '</div>';
    }
  }
  html += '</div>';
  return html;
}

function cleanLine(line) {
  return line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
}

// ============ Followup Buttons ============

function getFollowupButtons() {
  return `<div class="followup-box">
    <div class="fb-title">💬 מה תרצה לשאול עכשיו?</div>
    <div class="quick-row">
      ${appMode === 'pesticide' ? '<button class="qb" onclick="anotherPesticide()">🌿 שאלה נוספת על חומרי הדברה</button>' : ''}
      ${appMode === 'fruit' ? '<button class="qb blue" onclick="askAnotherFruit()">🍋 שאלה נוספת על גודל פרי</button>' : ''}
      ${appMode !== 'fruit' ? '<button class="qb blue" onclick="switchToFruit()">🍋 שאלה על גודל פרי</button>' : ''}
      ${appMode !== 'pesticide' ? '<button class="qb" onclick="switchToPesticide()">🌿 שאלה על חומרי הדברה</button>' : ''}
      <button class="qb gray" onclick="resetMode()">🔄 התחל מחדש</button>
    </div>
  </div>`;
}

function anotherPesticide() {
  addBubble('🌿 שאלה נוספת על חומרי הדברה', 'user');
  setTimeout(() => {
    addBubble(`<strong>שאל אותי על מזיק, מחלה או עשבייה</strong> — לדוגמה: "אקרית חלודה", "החמה", "פסילת ההדר".`, 'bot');
  }, 200);
}

function switchToPesticide() {
  addBubble('🌿 שאלה על חומרי הדברה', 'user');
  setTimeout(() => {
    addBubble(`<strong>איזה משווק אתה?</strong><br><br>הכללים שונים לכל משווק.
<div class="quick-row">
  <button class="qb yellow" onclick="choosePesticideGrower('shoham')">🟡 שוהם (אורי)</button>
  <button class="qb green" onclick="choosePesticideGrower('granot')">🟢 גרנות פרש</button>
  <button class="qb" onclick="choosePesticideGrower('general')">🌿 רשימה כללית</button>
</div>`, 'bot');
  }, 200);
}

function switchToFruit() {
  addBubble('🍋 שאלה על גודל פרי', 'user');
  setFruitMode();
  setTimeout(() => {
    addBubble(`🍋 <strong>עברתי למצב גודל פרי והשקייה</strong><br><br>
<strong>כתוב לי את הזן והגודל</strong> — לדוגמה:<br>
• "יש לי ניוהול, גודל הפרי 30"<br>
• "פומלית גודל 50"<br>
• "אורי 25"<br><br>
אני אשאל אותך על חודש קטיף ופרטים נוספים אם צריך.`, 'bot');
  }, 200);
}

// ============ Chat UI ============

function addBubble(html, role) {
  const M = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row' + (role === 'user' ? ' user' : '');
  const av = document.createElement('div');
  av.className = 'av ' + (role === 'user' ? 'av-user' : 'av-bot');
  av.textContent = role === 'user' ? '👨‍🌾' : '🍊';
  const bub = document.createElement('div');
  bub.className = 'bubble ' + role;
  bub.innerHTML = html;
  row.appendChild(av);
  row.appendChild(bub);
  M.appendChild(row);
  
  // אם זו תשובת בוט עם followup-box או product-block, גלול לתחילת התשובה
  // במקום לסוף — כך הפרדסן רואה קודם את התשובה המקצועית
  const hasFollowup = bub.querySelector('.followup-box');
  const hasProduct = bub.querySelector('.product-block');
  const hasWarning = bub.querySelector('.warning-box');
  
  if (role === 'bot' && (hasFollowup || hasProduct || hasWarning)) {
    // גלול כך שתחילת הבועה תהיה בראש האזור הנראה
    setTimeout(() => {
      const rowTop = row.offsetTop;
      M.scrollTo({ top: rowTop - 10, behavior: 'smooth' });
    }, 50);
  } else {
    M.scrollTop = M.scrollHeight;
  }
}

function showTyping() {
  const M = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'typing-row';
  row.id = 'typingRow';
  const av = document.createElement('div');
  av.className = 'av av-bot';
  av.textContent = '🍊';
  const bub = document.createElement('div');
  bub.className = 'typing-bub';
  bub.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  row.appendChild(av);
  row.appendChild(bub);
  M.appendChild(row);
  M.scrollTop = M.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingRow');
  if (t) t.remove();
}

// ============ Modes ============

function resetMode() {
  appMode = null;
  growerType = null;
  history = [];
  fruitContext = {};
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('modeBar').style.display = 'none';
  document.getElementById('hdrBadge').textContent = '✓ רשמי';
  showWelcome();
}

function setPesticideMode(type) {
  appMode = 'pesticide';
  growerType = type;
  history = [];
  const bar = document.getElementById('modeBar');
  const label = document.getElementById('modeLabel');
  const badge = document.getElementById('hdrBadge');
  bar.style.display = 'flex';
  if (type === 'shoham') {
    bar.className = 'mode-bar shoham';
    label.textContent = '🟡 חומרי הדברה — שוהם (אורי)';
    badge.textContent = '🟡 שוהם';
  } else if (type === 'granot') {
    bar.className = 'mode-bar granot';
    label.textContent = '🟢 חומרי הדברה — גרנות פרש';
    badge.textContent = '🟢 גרנות';
  } else {
    bar.className = 'mode-bar general';
    label.textContent = '🌿 חומרי הדברה — רשימה כללית';
    badge.textContent = '🌿 כללי';
  }
}

function setFruitMode() {
  appMode = 'fruit';
  growerType = null;
  fruitContext = {};
  const bar = document.getElementById('modeBar');
  const label = document.getElementById('modeLabel');
  const badge = document.getElementById('hdrBadge');
  bar.style.display = 'flex';
  bar.className = 'mode-bar fruit';
  label.textContent = '🍋 גודל פרי והשקייה';
  badge.textContent = '🍋 גודל פרי';
}

// ============ Server calls ============

async function askServer(message) {
  try {
    const response = await fetch(`${SERVER_URL}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: message,
        grower_type: growerType || 'general',
        fruit_context: fruitContext,
        history: history,
        mode: appMode === 'fruit' ? 'fruit' : 'pesticide'
      })
    });
    return await response.json();
  } catch (err) {
    return { reply: '⚠️ בעיה בחיבור. נסה שוב — לפעמים השרת ישן ולוקח דקה להתעורר.' };
  }
}

async function selectFruitOption(question, value) {
  try {
    addBubble(value, 'user');
    showTyping();
    const response = await fetch(`${SERVER_URL}/fruit_select`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        question: question,
        value: value,
        fruit_context: fruitContext
      })
    });
    const data = await response.json();
    removeTyping();
    handleServerResponse(data);
  } catch (err) {
    removeTyping();
    addBubble('בעיה בחיבור. נסה שוב.', 'bot');
  }
}

function handleServerResponse(data) {
  if (data.fruit_context !== undefined) fruitContext = data.fruit_context;

  let replyHtml = formatReply(data.reply);

  if (data.options) {
    replyHtml += '<div class="quick-row">';
    for (let choice of data.options.choices) {
      const safeValue = choice.value.replace(/'/g, "\\'");
      replyHtml += `<button class="qb blue" onclick="selectFruitOption('${data.options.question}', '${safeValue}')">${choice.label}</button>`;
    }
    replyHtml += '</div>';
  }

  // הוסף כפתורי המשך לכל תשובה שהיא תשובה סופית
  if (data.show_followup || (data.type === 'pesticide')) {
    replyHtml += getFollowupButtons();
  }

  addBubble(replyHtml, 'bot');
}

function askAnotherFruit() {
  fruitContext = {};
  appMode = 'fruit';
  setFruitMode();
  addBubble('🍋 שאלה נוספת על גודל פרי', 'user');
  setTimeout(() => {
    addBubble(`<strong>כתוב לי את הזן והגודל</strong> — לדוגמה: "ניוהול 35" או "פומלית גודל 50". אני אשאל אותך על חודש קטיף אם צריך.`, 'bot');
  }, 200);
}

function choosePesticideGrower(type) {
  setPesticideMode(type);
  let msg = '';
  if (type === 'shoham') {
    msg = '🟡 <strong>עברתי למאגר שוהם — מנדרינה אורי</strong><br><br>אענה לפי הכללים המחמירים של שוהם.<br><br>שאל אותי על מזיק או מחלה — לדוגמה: "אקרית חלודה", "כנימה אדומה".';
  } else if (type === 'granot') {
    msg = '🟢 <strong>עברתי למאגר גרנות פרש</strong><br><br>אענה לפי הכללים של גרנות-פרש: 🟨 צהוב = דווח, 🟪 סגול = אסור לחלק.<br><br>שאל אותי על מזיק או מחלה.';
  } else {
    msg = '🌿 <strong>עובד עם הרשימה הכללית של משרד החקלאות</strong><br><br>שאל אותי על מזיק, מחלה או עשבייה.';
  }
  addBubble(msg, 'bot');
}

async function startFruitFlow() {
  showTyping();
  const data = await askServer('');
  removeTyping();
  handleServerResponse(data);
}

// ============ Send ============

async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt || isLoading) return;
  inp.value = '';

  if (appMode === null) {
    addBubble(txt, 'user');
    addBubble('<strong>במה אני יכולה לעזור?</strong><br><br>בחר את סוג השאלה:<div class="quick-row"><button class="qb yellow" onclick="chooseStart(\'shoham\')">🟡 חומרי הדברה — שוהם</button><button class="qb green" onclick="chooseStart(\'granot\')">🟢 חומרי הדברה — גרנות</button><button class="qb" onclick="chooseStart(\'general\')">🌿 חומרי הדברה — כללי</button><button class="qb blue" onclick="chooseStart(\'fruit\')">🍋 גודל פרי</button></div>', 'bot');
    return;
  }

  addBubble(txt, 'user');
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const data = await askServer(txt);
  removeTyping();

  if (data.type === 'pesticide') {
    history.push({ role: 'user', content: txt });
    history.push({ role: 'assistant', content: data.reply });
    if (history.length > 20) history = history.slice(-20);
  }

  handleServerResponse(data);
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function chooseStart(type) {
  if (type === 'fruit') {
    setFruitMode();
    setTimeout(() => {
      addBubble(`🍋 <strong>עברתי למצב גודל פרי והשקייה</strong><br><br>
<strong>כתוב לי את הזן והגודל</strong> — לדוגמה:<br>
• "יש לי ניוהול, גודל הפרי 30"<br>
• "פומלית גודל 50"<br>
• "אורי 25"<br><br>
אני אשאל אותך על חודש קטיף ופרטים נוספים אם צריך.`, 'bot');
    }, 100);
  } else {
    choosePesticideGrower(type);
  }
}

function typeAndSend(txt) {
  document.getElementById('inp').value = txt;
  send();
}

function showWelcome() {
  setTimeout(() => {
    addBubble(`שלום! 🍊<br><br>
<strong>איך אני יכולה לעזור לך היום?</strong><br><br>
בחר מה אתה רוצה לבדוק:
<div class="quick-row">
  <button class="qb yellow" onclick="chooseStart('shoham')">🟡 חומרי הדברה — שוהם (אורי)</button>
  <button class="qb green" onclick="chooseStart('granot')">🟢 חומרי הדברה — גרנות פרש</button>
  <button class="qb" onclick="chooseStart('general')">🌿 חומרי הדברה — רשימה כללית</button>
  <button class="qb blue" onclick="chooseStart('fruit')">🍋 גודל פרי והשקייה</button>
</div>`, 'bot');
  }, 100);
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

showWelcome();
</script>
</body>
</html>
