<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>עוזרת הפרדס - קוטר פרי ממוצע רצוי</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #333;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .result-section {
            display: none;
            margin-top: 30px;
        }

        .result-section.show {
            display: block;
        }

        .result-box {
            background: #f8f9ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .desired-range {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }

        .desired-range h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .range-display {
            font-size: 28px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .measurements-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .measurements-container {
                grid-template-columns: 1fr;
            }
        }

        .measurement-card {
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .measurement-card.before {
            border-left: 5px solid #ff6b6b;
        }

        .measurement-card.after {
            border-left: 5px solid #51cf66;
        }

        .measurement-date {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .measurement-range {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #333;
        }

        .measurement-label {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .status-box {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 16px;
            font-weight: 600;
        }

        .status-good {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .status-bad {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .notes {
            background: #e7f3ff;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
        }

        .notes p {
            color: #1565c0;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .notes p:last-child {
            margin-bottom: 0;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f5c6cb;
            margin-top: 15px;
        }

        .source {
            font-size: 12px;
            color: #999;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .disclaimer {
            background: #fff9e6;
            border: 1px solid #ffe066;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            color: #856404;
            margin-top: 20px;
            text-align: right;
        }

        .variety-info {
            font-size: 14px;
            color: #666;
            margin-top: 15px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍊 עוזרת הפרדס</h1>
            <p>חישוב קוטר פרי ממוצע רצוי</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label for="variety">בחר זן:</label>
                <select id="variety" onchange="onVarietyChange()">
                    <option value="">-- בחר זן --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="harvest">סוג קטיף:</label>
                <select id="harvest">
                    <option value="">-- בחר סוג קטיף --</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="date">תאריך היום:</label>
                    <input type="date" id="date">
                </div>
                <div class="form-group">
                    <label for="diameter">קוטר פרי (מ"מ):</label>
                    <input type="number" id="diameter" min="0" max="200" placeholder="לדוגמה: 45">
                </div>
            </div>

            <div class="button-group">
                <button class="btn-search" onclick="searchRecommendation()">🔍 חפש</button>
                <button class="btn-reset" onclick="resetForm()">🔄 אפס</button>
            </div>
        </div>

        <div id="result" class="card result-section"></div>

        <div class="disclaimer">
            ⚠️ <strong>הערה חשובה:</strong> המידע בעוזרת זו הוא המלצה בלבד. המשתמש נושא את האחריות המלאה לגבי החלטותיו בנוגע להשקיה וקטיף. יש להתייעץ עם מומחה לאישור הנתונים לתנאים הספציפיים של החלקה שלך.
        </div>
    </div>

    <script>
        // Detect API base URL
        const API_BASE = window.location.hostname === 'localhost' 
            ? 'http://localhost:5000/api'
            : `${window.location.origin}/api`;

        console.log('API Base URL:', API_BASE);

        // Set today's date
        document.getElementById('date').valueAsDate = new Date();

        // Load varieties on page load
        window.onload = function() {
            loadVarieties();
        };

        async function loadVarieties() {
            try {
                const response = await fetch(`${API_BASE}/varieties`);
                const data = await response.json();
                
                const select = document.getElementById('variety');
                data.varieties.forEach(variety => {
                    const option = document.createElement('option');
                    option.value = variety;
                    option.textContent = variety;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading varieties:', error);
            }
        }

        async function onVarietyChange() {
            const variety = document.getElementById('variety').value;
            const harvestSelect = document.getElementById('harvest');
            
            harvestSelect.innerHTML = '<option value="">-- בחר סוג קטיף --</option>';
            
            if (!variety) return;
            
            try {
                const response = await fetch(`${API_BASE}/harvests/${encodeURIComponent(variety)}`);
                const data = await response.json();
                
                if (data.success) {
                    data.harvests.forEach(harvest => {
                        const option = document.createElement('option');
                        option.value = harvest;
                        option.textContent = harvest;
                        harvestSelect.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading harvests:', error);
            }
        }

        async function searchRecommendation() {
            const variety = document.getElementById('variety').value;
            const harvest = document.getElementById('harvest').value;
            const date = document.getElementById('date').value;
            const diameter = document.getElementById('diameter').value;
            
            if (!variety || !date || !diameter) {
                showError('אנא מלא את כל השדות');
                return;
            }
            
            showLoading();
            
            try {
                const response = await fetch(`${API_BASE}/recommendations`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        variety: variety,
                        harvest_type: harvest || null,
                        current_date: date,
                        current_diameter: parseFloat(diameter)
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError(`שגיאה בחיבור לשרת: ${error.message}`);
            }
        }

        function displayResults(data) {
            const resultDiv = document.getElementById('result');
            const desiredRange = data.desired_range;
            const measurements = data.closest_measurements;
            
            let html = '';
            
            // Header
            html += `<h2>${data.variety}</h2>`;
            
            // Variety info
            if (data.harvest_type) {
                html += `<div class="variety-info">📅 סוג קטיף: <strong>${data.harvest_type}</strong></div>`;
            }
            
            // Desired range
            const minText = desiredRange.min || 'ללא מינימום';
            const maxText = desiredRange.max || 'ללא מקסימום';
            html += `
                <div class="desired-range">
                    <h3>קוטר פרי ממוצע רצוי</h3>
                    <div class="range-display">${desiredRange.min || '?'} - ${desiredRange.max || '?'} מ"מ</div>
                </div>
            `;
            
            // Status
            const status = data.diameter_status;
            const statusClass = status.in_range ? 'status-good' : 'status-bad';
            html += `<div class="status-box ${statusClass}">${status.status}</div>`;
            
            // Closest measurements
            html += '<h3 style="margin-top: 20px; margin-bottom: 15px;">📊 המדידות הקרובות ביותר:</h3>';
            html += '<div class="measurements-container">';
            
            if (measurements.before) {
                const beforeDate = new Date(measurements.before.date);
                const dateStr = formatHebrewDate(beforeDate);
                html += `
                    <div class="measurement-card before">
                        <div class="measurement-label">⬅️ מדידה קודמת</div>
                        <div class="measurement-date">${dateStr}</div>
                        <div class="measurement-range">${measurements.before.range.min}-${measurements.before.range.max}</div>
                    </div>
                `;
            }
            
            if (measurements.after) {
                const afterDate = new Date(measurements.after.date);
                const dateStr = formatHebrewDate(afterDate);
                html += `
                    <div class="measurement-card after">
                        <div class="measurement-label">➡️ מדידה הבאה</div>
                        <div class="measurement-date">${dateStr}</div>
                        <div class="measurement-range">${measurements.after.range.min}-${measurements.after.range.max}</div>
                    </div>
                `;
            }
            
            html += '</div>';
            
            // Notes
            if (data.notes && data.notes.length > 0) {
                html += '<div class="notes">';
                data.notes.forEach(note => {
                    html += `<p>${note}</p>`;
                });
                html += '</div>';
            }
            
            // Source
            html += `<div class="source">📌 מקור: ${data.source}</div>`;
            
            resultDiv.innerHTML = html;
            resultDiv.classList.add('show');
        }

        function showLoading() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>מחפש נתונים...</p>
                </div>
            `;
            resultDiv.classList.add('show');
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `<div class="error">❌ ${message}</div>`;
            resultDiv.classList.add('show');
        }

        function resetForm() {
            document.getElementById('variety').value = '';
            document.getElementById('harvest').innerHTML = '<option value="">-- בחר סוג קטיף --</option>';
            document.getElementById('date').valueAsDate = new Date();
            document.getElementById('diameter').value = '';
            document.getElementById('result').classList.remove('show');
        }

        function formatHebrewDate(date) {
            const months = ['ינו', 'פבר', 'מרס', 'אפר', 'מאי', 'יוני', 'יולי', 'אוג', 'ספט', 'אוק', 'נוב', 'דצמ'];
            const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
            
            const day = date.getDate();
            const month = months[date.getMonth()];
            const year = date.getFullYear();
            
            return `${day} ${month} ${year}`;
        }
    </script>
</body>
</html>
